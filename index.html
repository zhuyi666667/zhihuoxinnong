  <script>
    /* ---- 时钟 ---- */
    function updateClock() {
      const now = new Date();
      const dateEl = document.getElementById('current-date');
      const timeEl = document.getElementById('current-time');
      if (dateEl) dateEl.textContent = now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' });
      if (timeEl) timeEl.textContent = now.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* ---- 粒子背景 ---- */
    (function initParticles() {
      const canvas = document.getElementById('particle-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];
      const COUNT = 38;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function randomParticle() {
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 3 + 1,
          dx: (Math.random() - 0.5) * 0.4,
          dy: -(Math.random() * 0.5 + 0.2),
          alpha: Math.random() * 0.4 + 0.15,
          color: Math.random() > 0.5 ? '#2e7d32' : '#66bb6a',
          shape: Math.random() > 0.6 ? 'leaf' : 'dot'
        };
      }

      for (let i = 0; i < COUNT; i++) particles.push(randomParticle());

      function drawLeaf(x, y, size, alpha, color) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x, y);
        ctx.rotate(Math.random() * 0.1);
        ctx.beginPath();
        ctx.moveTo(0, -size * 2);
        ctx.bezierCurveTo(size * 1.2, -size, size * 1.2, size, 0, size * 2);
        ctx.bezierCurveTo(-size * 1.2, size, -size * 1.2, -size, 0, -size * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }

      function animate() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach((p, i) => {
          if (p.shape === 'leaf') {
            drawLeaf(p.x, p.y, p.r, p.alpha, p.color);
          } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.fill();
            ctx.globalAlpha = 1;
          }
          p.x += p.dx;
          p.y += p.dy;
          if (p.y < -20 || p.x < -20 || p.x > W + 20) {
            particles[i] = randomParticle();
            particles[i].y = H + 10;
          }
        });
        requestAnimationFrame(animate);
      }
      animate();
    })();

    /* ---- 数字滚动动画 ---- */
    function animateCounter(el, target, duration) {
      if (!el) return;
      const start = 0;
      const step = target / (duration / 16);
      let current = start;
      const timer = setInterval(() => {
        current += step;
        if (current >= target) { current = target; clearInterval(timer); }
        el.textContent = Math.floor(current).toLocaleString('zh-CN');
      }, 16);
    }

    window.runCounters = function() {
      document.querySelectorAll('[data-count]').forEach(el => {
        const val = parseInt(el.getAttribute('data-count'));
        animateCounter(el, val, 1200);
      });
    };

    /* ---- 卡片入场动画（IntersectionObserver） ---- */
    function initCardAnimations() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            setTimeout(() => {
              entry.target.classList.add('anim-in');
            }, i * 60);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.stat-card, .card, .trace-card').forEach(el => {
        el.classList.add('anim-ready');
        observer.observe(el);
      });
    }

    /* ---- 按钮涟漪 ---- */
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('.btn, .nav-item, .bottom-nav-item');
      if (!btn) return;
      const ripple = document.createElement('span');
      ripple.className = 'ripple-fx';
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
      btn.style.position = btn.style.position || 'relative';
      btn.style.overflow = 'hidden';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });

    /* ---- 页面切换时重新触发入场动画 ---- */
    const _origNavigate = window.App ? App.navigate.bind(App) : null;
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(initCardAnimations, 300);
      setTimeout(window.runCounters, 100);
    });

    const _pageBodyObserver = new MutationObserver(() => {
      setTimeout(initCardAnimations, 100);
      setTimeout(window.runCounters, 200);
    });
    const pb = document.getElementById('page-body');
    if (pb) _pageBodyObserver.observe(pb, { childList: true, subtree: false });
  </script>
